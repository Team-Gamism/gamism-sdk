name: NuGet Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          cache: true

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore Gamism.SDK/Gamism.SDK.sln

      - name: Build
        run: dotnet build Gamism.SDK/Gamism.SDK.sln -c Release --no-restore

      - name: Pack
        run: |
          dotnet pack Gamism.SDK/Gamism.SDK.Core/Gamism.SDK.Core.csproj \
            -c Release \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            --no-build \
            -o ./artifacts

          dotnet pack Gamism.SDK/Gamism.SDK.Extensions.AspNetCore/Gamism.SDK.Extensions.AspNetCore.csproj \
            -c Release \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            --no-build \
            -o ./artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg

      - name: Push to NuGet
        run: |
          for file in ./artifacts/*.nupkg; do
            dotnet nuget push "$file" \
              --api-key ${{ secrets.NUGET_API_KEY }} \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*.nupkg
          generate_release_notes: true