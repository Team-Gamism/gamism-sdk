name: NuGet Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

jobs:
  versioning:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      version: ${{ steps.bump.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest tag
        id: get_tag
        run: |
          git fetch --tags
          TAG=$(git tag -l 'v*.*.*' --sort=-v:refname | head -n 1)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Bump version (patch)
        id: bump
        run: |
          if [ -z "${{ steps.get_tag.outputs.tag }}" ]; then
            VERSION="0.1.0"
          else
            VERSION=${{ steps.get_tag.outputs.tag }}
            VERSION=${VERSION#v}

            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            PATCH=$((PATCH + 1))
            VERSION="$MAJOR.$MINOR.$PATCH"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "New version: $VERSION"

      - name: Create tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag v${{ steps.bump.outputs.version }}
          git push origin v${{ steps.bump.outputs.version }}

  release:
    runs-on: ubuntu-latest
    needs: [versioning]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          cache: true

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore Gamism.SDK/Gamism.SDK.sln

      - name: Build
        run: dotnet build Gamism.SDK/Gamism.SDK.sln -c Release --no-restore

      - name: Pack
        run: |
          dotnet pack Gamism.SDK/Gamism.SDK.Core/Gamism.SDK.Core.csproj \
            -c Release \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            --no-build \
            -o ./artifacts

          dotnet pack Gamism.SDK/Gamism.SDK.Extensions.AspNetCore/Gamism.SDK.Extensions.AspNetCore.csproj \
            -c Release \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            --no-build \
            -o ./artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg

      - name: Push to NuGet
        run: |
          for file in ./artifacts/*.nupkg; do
            dotnet nuget push "$file" \
              --api-key ${{ secrets.NUGET_API_KEY }} \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*.nupkg
          generate_release_notes: true