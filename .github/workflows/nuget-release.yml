name: NuGet Release

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Resolve version
        id: version
        run: |
          echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore Gamism.SDK/Gamism.SDK.sln

      - name: Build
        run: dotnet build Gamism.SDK/Gamism.SDK.sln -c Release --no-restore

      - name: Pack
        run: |
          dotnet pack Gamism.SDK/Gamism.SDK.Core/Gamism.SDK.Core.csproj \
            -c Release \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            --no-build \
            -o ./artifacts

          dotnet pack Gamism.SDK/Gamism.SDK.Extensions.AspNetCore/Gamism.SDK.Extensions.AspNetCore.csproj \
            -c Release \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            --no-build \
            -o ./artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg

      - name: Push to NuGet.org
        run: |
          for file in ./artifacts/*.nupkg; do
            dotnet nuget push "$file" \
              --api-key ${{ secrets.NUGET_API_KEY }} \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

      - name: Push to GitHub Packages
        run: |
          dotnet nuget add source \
            --username ${{ github.repository_owner }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

          for file in ./artifacts/*.nupkg; do
            dotnet nuget push "$file" \
              --source github \
              --skip-duplicate
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          files: ./artifacts/*.nupkg
          generate_release_notes: true
