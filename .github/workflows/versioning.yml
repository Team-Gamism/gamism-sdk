name: Versioning

on:
  push:
    branches:
      - main

concurrency:
  group: versioning
  cancel-in-progress: false

jobs:
  versioning:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      version: ${{ steps.bump.outputs.version }}
      is_new: ${{ steps.bump.outputs.is_new }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version
        id: bump
        run: |
          git fetch --tags
          TAG=$(git tag -l 'v*.*.*' --sort=-v:refname | head -n 1)

          if [ -z "$TAG" ]; then
            VERSION="0.1.0"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_new=true" >> $GITHUB_OUTPUT
            echo "First version: $VERSION"
            exit 0
          fi

          COMMITS=$(git log "$TAG"..HEAD --pretty=format:"%s")

          if [ -z "$COMMITS" ]; then
            echo "No new commits since last tag"
            echo "version=${TAG#v}" >> $GITHUB_OUTPUT
            echo "is_new=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "${TAG#v}"

          if echo "$COMMITS" | grep -qE '^feat!:|BREAKING CHANGE:'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$COMMITS" | grep -qE '^feat:'; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          VERSION="$MAJOR.$MINOR.$PATCH"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_new=true" >> $GITHUB_OUTPUT
          echo "New version: $VERSION"

      - name: Create tag
        if: steps.bump.outputs.is_new == 'true'
        run: |
          VERSION=${{ steps.bump.outputs.version }}

          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag already exists. Skipping."
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag v$VERSION
          git push origin v$VERSION

  release:
    needs: versioning
    if: needs.versioning.outputs.is_new == 'true'
    uses: ./.github/workflows/nuget-release.yml
    with:
      version: ${{ needs.versioning.outputs.version }}
    permissions:
      contents: write
      packages: write
    secrets: inherit